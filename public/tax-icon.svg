<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="58" y="48" width="84" height="100" rx="10" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="58" y="48" width="84" height="24" rx="10" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#f59e0b" letter-spacing="1">KRA</text>
  <circle cx="82" cy="92" r="10" fill="url(#accent)" opacity="0.25"/>
  <text x="82" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#f59e0b">%</text>
  <rect x="100" y="86" width="32" height="5" rx="2.5" fill="#f59e0b" opacity="0.3"/>
  <rect x="100" y="96" width="24" height="4" rx="2" fill="#f59e0b" opacity="0.2"/>
  <rect x="72" y="114" width="56" height="5" rx="2.5" fill="#f59e0b" opacity="0.25"/>
  <rect x="72" y="124" width="40" height="5" rx="2.5" fill="#f59e0b" opacity="0.18"/>
  <rect x="72" y="134" width="48" height="5" rx="2.5" fill="#f59e0b" opacity="0.15"/>
  <rect x="50" y="158" width="100" height="22" rx="4" fill="#f59e0b" opacity="0.12"/>
  <text x="100" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#f59e0b" letter-spacing="2">TAX &amp; KRA</text>
