<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="45" fill="none" stroke="url(#globe)" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="100" cy="90" rx="20" ry="45" fill="none" stroke="url(#globe)" stroke-width="2"/>
  <line x1="55" y1="75" x2="145" y2="75" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="90" x2="145" y2="90" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="105" x2="145" y2="105" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <rect x="60" y="140" width="80" height="24" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="100" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="11" fill="#10b981" letter-spacing="2">PASSPORT</text>
</svg>
