  <text x="100" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="7" fill="#020617">KDM 789C</text>
  <circle cx="80" cy="145" r="12" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
