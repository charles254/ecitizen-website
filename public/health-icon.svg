  <rect x="72" y="80" width="50" height="4" rx="2" fill="#ef4444" opacity="0.15"/>
  <circle cx="100" cy="115" r="25" fill="url(#cross)" filter="url(#glow)" opacity="0.85"/>
  <rect x="93" y="102" width="14" height="26" rx="3" fill="white" opacity="0.9"/>
  <rect x="87" y="108" width="26" height="14" rx="3" fill="white" opacity="0.9"/>
  <path d="M65 90 Q60 90 60 85" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <circle cx="140" cy="60" r="3" fill="#ef4444" opacity="0.2"/>
  <circle cx="150" cy="75" r="2" fill="#ef4444" opacity="0.15"/>
